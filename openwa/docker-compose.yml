# OpenWA host for LNO Control Center WhatsApp alerts.
# Runs @open-wa/wa-automate's EASY API (https://www.open-wa.org/, https://docs.open-wa.dev/).
# This is the always-on Node service the Control Center backend calls to send messages —
# it CANNOT run on Vercel (it drives a real WhatsApp Web session via headless Chrome).
#
# Quick start (on any always-on host with Docker):
#   1. Put a long random key in a .env file next to this file:  OPENWA_API_KEY=...
#      (generate one with:  openssl rand -hex 24)
#   2.  docker compose up -d
#   3.  docker compose logs -f openwa   → scan the QR with WhatsApp ▸ Linked devices
#       (or open  http://<HOST>:8080/api/getQrPng  in a browser)
#   4. In the Control Center ▸ Admin ▸ OpenWA:
#        API URL = https://<HOST>:8080     (put it behind HTTPS / a reverse proxy in prod)
#        API Key = the OPENWA_API_KEY above
#      Enable, then "Send test message".
services:
  openwa:
    image: openwa/wa-automate:latest
    container_name: lno-openwa
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: >
      --port 8080
      --host 0.0.0.0
      --api-key ${OPENWA_API_KEY}
      --session-id lno
      --disable-spins
      --skip-broken-methods
    volumes:
      - openwa_session:/sessions   # persist the linked WhatsApp session across restarts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  openwa_session:
